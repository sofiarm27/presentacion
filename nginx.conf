server {
    listen ${PORT:-80};
    
    # Directorio donde Vite genera los archivos
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Cualquier ruta solicitada debe redirigir a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para archivos estáticos (js, css, imágenes)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
